<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos | Banco de Agricultura Salvadoreño</title>
    <link rel="stylesheet" th:href="@{/css/app-shell.css}">
    <link rel="stylesheet" th:href="@{/css/pagos.css}">
</head>
<body>
<div class="app-shell">
    <header th:replace="~{layout/fragments :: topbar}"></header>
    <aside th:replace="~{layout/fragments :: sidebar('pagos')}"></aside>

    <main class="content">
        <h1>Pagos</h1>
        <p class="subtitle">Flujo visual pendiente de integración</p>

        <section class="panel-placeholder">
            <p>Aquí irá la pantalla final de pagos en la siguiente iteración.</p>
        </section>
    </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script th:src="@{/js/app-shell.js}"></script>
<script th:src="@{/js/pagos.js}"></script>
</body>
</html>
