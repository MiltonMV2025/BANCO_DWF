<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="topbar" th:fragment="topbar">
    <p class="brand">Banco de Agricultura Salvadoreño</p>
    <div class="topbar-actions">
        <span class="avatar">JD</span>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn" aria-label="Cerrar sesión">
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            </button>
        </form>
    </div>
</header>

<aside class="sidebar" th:fragment="sidebar(activeMenu)">
    <nav aria-label="Navegación principal">
        <span class="menu-role">Panel Usuario</span>

        <a class="nav-item"
           th:classappend="${activeMenu == 'dashboard'} ? ' active'"
           th:href="@{/dashboard}">
            <i class="bi bi-house-door nav-icon" aria-hidden="true"></i>
            <span>Dashboard</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'movimientos'} ? ' active'"
           th:href="@{/movimientos}">
            <i class="bi bi-arrow-left-right nav-icon" aria-hidden="true"></i>
            <span>Movimientos</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'transferencias'} ? ' active'"
           th:href="@{/transferencias}">
            <i class="bi bi-send nav-icon" aria-hidden="true"></i>
            <span>Transacciones</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'prestamos'} ? ' active'"
           th:href="@{/prestamos}">
            <i class="bi bi-cash-coin nav-icon" aria-hidden="true"></i>
            <span>Mis Préstamos</span>
        </a>

        <span class="menu-role">Panel Gerencia</span>

        <a class="nav-item"
           th:classappend="${activeMenu == 'clientes'} ? ' active'"
           th:href="@{/gerencia/clientes}">
            <i class="bi bi-people nav-icon" aria-hidden="true"></i>
            <span>Clientes</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'empleados'} ? ' active'"
           th:href="@{/gerencia/empleados}">
            <i class="bi bi-person-badge nav-icon" aria-hidden="true"></i>
            <span>Empleados</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'aprobacion-creditos'} ? ' active'"
           th:href="@{/gerencia/aprobacion-creditos}">
            <i class="bi bi-patch-check nav-icon" aria-hidden="true"></i>
            <span>Aprobación Créditos</span>
        </a>
    </nav>
</aside>
</body>
</html>
