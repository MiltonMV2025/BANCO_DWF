<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="topbar" th:fragment="topbar">
    <p class="brand">Banco de Agricultura Salvadoreño</p>
    <div class="topbar-actions">
        <span class="avatar">JD</span>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn" aria-label="Cerrar sesión">
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            </button>
        </form>
    </div>
</header>

<aside class="sidebar" th:fragment="sidebar(activeMenu)">
    <nav aria-label="Navegación principal">
        <a class="nav-item"
           th:classappend="${activeMenu == 'dashboard'} ? ' active'"
           th:href="@{/dashboard}">
            <i class="bi bi-house-door nav-icon" aria-hidden="true"></i>
            <span>Dashboard</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'movimientos'} ? ' active'"
           th:href="@{/movimientos}">
            <i class="bi bi-arrow-left-right nav-icon" aria-hidden="true"></i>
            <span>Movimientos</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'transferencias'} ? ' active'"
           th:href="@{/transferencias}">
            <i class="bi bi-send nav-icon" aria-hidden="true"></i>
            <span>Transferencias</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'pagos'} ? ' active'"
           th:href="@{/pagos}">
            <i class="bi bi-receipt nav-icon" aria-hidden="true"></i>
            <span>Pagos</span>
        </a>

        <a class="nav-item"
           th:classappend="${activeMenu == 'configuracion'} ? ' active'"
           th:href="@{/configuracion}">
            <i class="bi bi-gear nav-icon" aria-hidden="true"></i>
            <span>Configuración</span>
        </a>
    </nav>
</aside>
</body>
</html>
